name: AppSec Pipeline

on:
   push: 
     branches: 
       - main

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
    
     - name: Run Semgrep
       uses: returntocorp/semgrep-action@v1
       with:
         config: auto
    
     - name: Run Gitleaks
       uses: gitleaks/gitleaks-action@v2
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
