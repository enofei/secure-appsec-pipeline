name: Shieldflow CI/CD Pipeline

on:
  push:
    branches: [ main ]  # Triggers when code is pushed to the main branch

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Gitleaks to scan full commit history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install and Run Semgrep
        run: |
          pip install semgrep
          semgrep --version
          semgrep --config=auto . --verbose

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # 2. Trivy pulls the Juice Shop image and scans it for vulnerabilities
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/bkimminich/juice-shop:latest'
          format: 'table'
          exit-code: '1' # 💡 Fails the build if critical vulnerabilities are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: security-scan  # 💡 Blocks deployment if Semgrep or Gitleaks finds a critical bug
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # Make sure this secret is added in GitHub
          script: |
            # Clean up BOTH naming variations to free up Port 80
            docker stop juice-shop juiceshop || true
            docker rm juice-shop juiceshop || true
            
            # Fetch the newest image
            docker pull bkimminich/juice-shop:latest
            
            # Spin up the fresh container with an automatic restart policy
            docker run -d \
              --name juice-shop \
              --restart unless-stopped \
              -p 80:3000 \
              bkimminich/juice-shop:latest

      # Triggers the webhook notification you had at the end of your file
      - name: Notify Shuffle
        run: |
          echo "Deployment complete. Triggering Shuffle webhook..."
          # Add your exact Shuffle curl command below if needed
