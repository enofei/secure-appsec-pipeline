name: AppSec Pipeline

on:
   push: 
     branches: 
       - main

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v2
      with:
        config: auto
        
    - name: Run Gitleaks
      run: docker run --rm -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest detect --source="/path" --verbose
